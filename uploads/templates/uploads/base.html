<!DOCTYPE html>
<html>
<head>
    <title>Django App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .logout-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- 🔝 Navbar (visible on ALL pages) -->
<div class="navbar">
    <div class="nav-links">
        <a href="{% url 'upload' %}">Upload</a>
        <a href="{% url 'gallery' %}">Gallery</a>
    </div>

    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="logout-btn">Logout</button>
    </form>
    {% endif %}
</div>

<!-- 🔽 Page content -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
