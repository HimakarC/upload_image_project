{% extends 'uploads/base.html' %}

{% block content %}

<style>
.form-container {
    max-width: 400px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    text-align: center;
}

.form-container h2 {
    margin-bottom: 20px;
}

.form-container input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
}

.form-container button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
}

.form-container button:hover {
    transform: scale(1.05);
}

.link {
    margin-top: 15px;
    display: block;
    color: #ddd;
}
</style>

<div class="form-container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}" class="link">
        Don't have an account? Register
    </a>
</div>

{% endblock %}
