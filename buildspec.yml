version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - mkdir -p package
      - pip install --upgrade pip
      - pip install -r requirements.txt -t package/

  build:
    commands:
      - cp -r upload_image_project package/
      - cp -r uploads package/
      - cp manage.py package/
      - cp lambda_function.py package/

  post_build:
    commands:
      - cd package
      - zip -r ../app.zip .

artifacts:
  files:
    - app.zip